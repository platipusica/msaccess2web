name: Build Windows Executable

#on:
#  push:
#    branches: [ main ]
#  pull_request:
#    branches: [ main ]
#  release:
#    types: [ created ]
on:
  push:
    branches: [ main ]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write  # IMPORTANT: mandatory for making GitHub Releases
  id-token: write  # IMPORTANT: mandatory for sigstore

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        #pip install pyodbc
        # Add any other dependencies your script needs
        pip install -r requirements.txt  # if you have one
        
    - name: Build Windows Executable (GUI - No Console)
      uses: Nuitka/Nuitka-Action@main
      with:
        nuitka-version: main
        script-name: scaffold_msaccess.py  # Your main script
        mode: onefile
        #onefile-tempdir-spec: C:\Windows\Temp  # Optional: temp directory
        # Windows-specific options
        #windows-disable-console: true  # Hides console window
        windows-uac-admin: false  # Set to true if app needs admin rights
        #windows-icon-from-ico: path/to/icon.ico  # Optional: add icon
        include-data-dir: 
          - '.=.'  # Include all files from current directory
        include-package-data: 
          - 'textblob'
          - 'sqlparse'
          - 'pyodbc'
        enable-plugin: 
          - 'anti-bloat'  # Reduces file size
          - 'tk-inter'  # If you're using tkinter for GUI
        nofollow-import-to: 
          - 'unittest'
          - 'pytest'
          - 'setuptools'
          - 'IPython'
          - 'numba'
          - 'scipy'
        # Output options
        output-file: scaffold_msaccess.exe
        # Build options
        assume-yes-for-downloads: true  # Automatically accept downloads
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScaffoldDB-Windows
        path: scaffold_msaccess.exe
        if-no-files-found: error
    

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: scaffold_msaccess.exe
