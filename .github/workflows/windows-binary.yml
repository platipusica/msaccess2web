name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write  # IMPORTANT: mandatory for making GitHub Releases
  id-token: write  # IMPORTANT: mandatory for sigstore

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12' 
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyodbc textblob sqlparse
        # Download textblob corpora
        python -c "import textblob; textblob.download_corpora()"
        # If you have requirements.txt
        # pip install -r requirements.txt
    
    - name: Build Windows Executable
      uses: Nuitka/Nuitka-Action@main
      with:
        nuitka-version: main
        script-name: scaffold_msaccess.py
        mode: onefile
#        windows-disable-console: true
        windows-uac-admin: false
        include-data-dir: '.=.'  # Single line, not a list
        include-package-data: 'textblob sqlparse pyodbc'  # Space-separated
        enable-plugin: 'anti-bloat tk-inter'  # Space-separated
        nofollow-import-to: 'unittest pytest setuptools IPython numba scipy'  # Space-separated
        output-file: scaffold_msaccess.exe
        assume-yes-for-downloads: true
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScaffoldDB-Windows
        path: scaffold_msaccess.exe
        if-no-files-found: error
    
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: scaffold_msaccess.exe
