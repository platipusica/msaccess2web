name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
    
    - name: Install dependencies and download corpora
      run: |
        python -m pip install --upgrade pip
        pip install pyodbc sqlparse textblob
        python download_corpora.py
    
    - name: Build Windows Executable
      shell: pwsh
      run: |
        python -m nuitka --standalone --onefile --msvc=latest --enable-plugin=anti-bloat --include-package=textblob --include-package=nltk --include-package-data=sqlparse --include-package-data=pyodbc --include-package-data=textblob --nofollow-import-to=unittest --nofollow-import-to=pytest --nofollow-import-to=setuptools --output-dir=build --output-filename=scaffold_msaccess.exe scaffold_msaccess.py
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScaffoldDB-Windows
        path: build/scaffold_msaccess.exe
        if-no-files-found: error
