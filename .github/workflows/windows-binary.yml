name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyodbc sqlparse inflect
        # If you still need textblob instead of inflect:
        # pip install textblob
        # python -c "import nltk; nltk.download('punkt'); nltk.download('averaged_perceptron_tagger'); nltk.download('brown'); nltk.download('wordnet')"
    
    - name: Build Windows Executable (Console)
      uses: Nuitka/Nuitka-Action@main
      with:
        script-name: scaffold_msaccess.py
        mode: onefile
        # Remove windows-disable-console to keep console visible
        include-package-data: 'sqlparse pyodbc'
        enable-plugin: 'anti-bloat'
        nofollow-import-to: 'unittest pytest setuptools IPython numba scipy'
        output-file: scaffold_msaccess.exe
        assume-yes-for-downloads: true
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScaffoldDB-Windows
        path: scaffold_msaccess.exe
        if-no-files-found: error
    
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: scaffold_msaccess.exe
