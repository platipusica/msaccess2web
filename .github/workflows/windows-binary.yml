name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyodbc textblob sqlparse
        
        # Download textblob corpora using the correct method
        python -c "import textblob.download_corpora; textblob.download_corpora.download()"
    
    - name: Build Windows Executable
      uses: Nuitka/Nuitka-Action@main
      with:
        script-name: scaffold_msaccess.py
        mode: onefile
#        windows-disable-console: true
        include-package-data: 'textblob sqlparse pyodbc'
        enable-plugin: 'anti-bloat tk-inter'
        nofollow-import-to: 'unittest pytest setuptools IPython numba scipy'
        output-file: scaffold_msaccess.exe
        assume-yes-for-downloads: true
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScaffoldDB-Windows
        path: scaffold_msaccess.exe
        if-no-files-found: error
    
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: scaffold_msaccess.exe
